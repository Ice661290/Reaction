<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Register - Reaction Command Center</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding-bottom: 40px;
        }
        .auth-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            background-image: linear-gradient(135deg, rgba(0,240,255,0.1), rgba(126,231,135,0.05));
            border: 1px solid rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out forwards;
        }
        .auth-card h2 {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            color: var(--secondary);
            text-shadow: 0 0 10px rgba(126, 231, 135, 0.5);
            margin-bottom: 30px;
            margin-top: 0;
            font-size: 2rem;
        }
        .input-row {
            display: flex;
            gap: 15px;
        }
        .input-row .input-group {
            flex: 1;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 600;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 10px rgba(126, 231, 135, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, var(--secondary), #2ea043);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(126, 231, 135, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(126, 231, 135, 0.6);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .auth-footer a:hover {
            text-shadow: 0 0 8px var(--secondary);
        }
        #errorMsg {
            color: #ff4d4d;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }
        #successMsg {
            color: var(--secondary);
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            min-height: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ REACTOR DASHBOARD</h1>
        <div class="auth-container">
            <div class="auth-card">
                <h2>REGISTER</h2>
                <div id="errorMsg"></div>
                <div id="successMsg">สมัครสมาชิกสำเร็จ! กำลังพากลับไปหน้า Login...</div>
                <form id="registerForm">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="FirstName">ชื่อ (First Name)</label>
                            <input type="text" id="FirstName" required>
                        </div>
                        <div class="input-group">
                            <label for="LastName">นามสกุล (Last Name)</label>
                            <input type="text" id="LastName" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="UserID">User ID (ชื่อผู้ใช้ / รหัสประจำตัว)</label>
                        <input type="text" id="UserID" required>
                    </div>
                    <div class="input-group">
                        <label for="Password">รหัสผ่าน (Password)</label>
                        <input type="password" id="Password" required>
                    </div>
                    <div class="input-group">
                        <label for="ConfirmPassword">ยืนยันรหัสผ่าน (Confirm Password)</label>
                        <input type="password" id="ConfirmPassword" required>
                    </div>
                    <button type="submit" class="btn">REGISTER</button>
                </form>
                <div class="auth-footer">
                    มีบัญชีอยู่แล้วใช่ไหม? <a href="index.html">เข้าสู่ระบบ (Login)</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const FirstName = document.getElementById('FirstName').value;
            const LastName = document.getElementById('LastName').value;
            const UserID = document.getElementById('UserID').value;
            const Password = document.getElementById('Password').value;
            const ConfirmPassword = document.getElementById('ConfirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            errorMsg.textContent = '';
            
            if (Password !== ConfirmPassword) {
                errorMsg.textContent = 'รหัสผ่านไม่ตรงกัน (Passwords do not match)';
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ FirstName, LastName, UserID, Password })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('registerForm').style.display = 'none';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    errorMsg.textContent = data.error || 'Registration failed.';
                }
            } catch (error) {
                errorMsg.textContent = 'Server error. Please try again.';
            }
        });
    </script>
</body>
</html>
